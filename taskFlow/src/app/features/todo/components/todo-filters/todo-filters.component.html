<div class="filters">

  <button
    *ngFor="let f of statusFilters"
    class="filter-btn"
    [class.active]="activeFilter === f.value"
    (click)="onFilterClick(f.value)">
    {{ f.label }}
  </button>

  <div class="filter-sep"></div>

  <button
    *ngFor="let f of priorityFilters"
    class="filter-btn"
    [class.active]="activeFilter === f.value"
    (click)="onFilterClick(f.value)">
    {{ f.label }}
  </button>

</div>
