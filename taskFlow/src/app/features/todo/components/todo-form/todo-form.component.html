<div class="add-form">

  <div class="form-label">New Task — POST /todo</div>

  <div class="form-row">

    <div class="input-wrap">
      <input
        type="text"
        [(ngModel)]="title"
        placeholder="e.g. Learn Kubernetes, Fix auth bug…"
        [disabled]="isSubmitting"
        (keydown.enter)="submit()" />
    </div>

    <div class="priority-select">
      <button
        *ngFor="let p of priorities"
        class="priority-btn"
        [ngClass]="selectedPriority === p ? 'active-' + p.toLowerCase() : ''"
        [disabled]="isSubmitting"
        (click)="selectPriority(p)">
        {{ p === 'MEDIUM' ? 'MED' : p }}
      </button>
    </div>

    <button class="add-btn" [disabled]="isSubmitting" (click)="submit()">
      {{ isSubmitting ? '…' : '+ Add' }}
    </button>

  </div>
</div>
