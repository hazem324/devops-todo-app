<!-- Empty state -->
<div class="empty" *ngIf="todos.length === 0">
  <div class="empty-icon">◻</div>
  <p>No tasks found</p>
</div>

<!-- Task rows -->
<div class="todo-list" *ngIf="todos.length > 0">
  <app-todo-item
    *ngFor="let todo of todos; trackBy: trackById"
    [todo]="todo"
    [isEditing]="editingId === todo.id"
    (startEdit)="startEdit.emit($event)"
    (cancelEdit)="cancelEdit.emit()"
    (todoUpdated)="todoUpdated.emit($event)"
    (todoDeleted)="todoDeleted.emit($event)">
  </app-todo-item>
</div>
