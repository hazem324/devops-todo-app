<div class="page">

  <!-- Header: receives computed stats only -->
  <app-todo-header
    [total]="totalCount"
    [done]="doneCount"
    [pending]="pendingCount">
  </app-todo-header>

  <!-- Form: calls POST /todo internally, emits the created todo up -->
  <app-todo-form
    (todoCreated)="onTodoCreated($event)">
  </app-todo-form>

  <!-- Filters: calls GET /todo/completed/:bool or /todo/priority/:p internally -->
  <app-todo-filters
    [activeFilter]="activeFilter"
    (filterChange)="activeFilter = $event"
    (filteredResults)="todos = $event">
  </app-todo-filters>

  <!-- Loading -->
  <div class="loading-bar" *ngIf="isLoading">
    <div class="loading-bar__track">
      <div class="loading-bar__fill"></div>
    </div>
    <span>Fetching tasks…</span>
  </div>

  <!-- List: passes editingId down, todo-item handles its own API calls -->
  <app-todo-list
    *ngIf="!isLoading"
    [todos]="filteredTodos"
    [editingId]="editingId"
    (startEdit)="editingId = $event"
    (cancelEdit)="editingId = null"
    (todoUpdated)="onTodoUpdated($event)"
    (todoDeleted)="onTodoDeleted($event)">
  </app-todo-list>

  <!-- Footer -->
  <div class="footer-bar" *ngIf="!isLoading">
    <span>{{ filteredTodos.length }} task(s) shown</span>
  </div>

</div>

<!-- Global toast: driven by ToastService, lives here once for whole feature -->
<app-toast></app-toast>
