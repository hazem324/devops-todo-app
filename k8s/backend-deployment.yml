apiVersion: apps/v1
Kind: Deployment
metadata: 
  name: backend
spec: 
  replicas: 2
  selector: 
    matchLabels: 
      app: taskflow-backend
  template: 
    metadata:
      labels:
        app: taskflow-backend
    containers:
      - name: backend
        images: hazem231/todo-backend:latest
        ports: 
          - containerPort: 8090
        env:
          - name: SPRING_DATASOURCE_URL
            value: jdbc:mysql://db-service:3306/todo